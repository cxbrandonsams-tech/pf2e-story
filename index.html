<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Otari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        // Custom screen aliases used for the chrome around the book.
        // - `big`: only matches when BOTH viewport dimensions are >720px,
        //   i.e. desktop / large tablet. Used for header + footer styling
        //   so a phone in landscape (e.g. 844×390) keeps the compact mobile
        //   chrome instead of upgrading to the desktop pill on width alone.
        //   Tailwind's default `md:` (≥768px width) doesn't have a
        //   height-aware equivalent.
        // The default md/lg/xl/2xl breakpoints are kept for everything else.
        extend: {
          screens: {
            big: { raw: '(min-width: 721px) and (min-height: 721px)' },
          },
          colors: {
            "surface-container-lowest": "#0b0e13",
            "surface-container": "#1d2025",
            "on-surface": "#e1e2e9",
            "background": "#101418",
            "on-primary-fixed": "#301400",
            "on-secondary-fixed": "#071d31",
            "surface-container-highest": "#32353a",
            "outline-variant": "#554337",
            "surface-container-low": "#191c21",
            "on-tertiary-container": "#3d2313",
            "on-primary-fixed-variant": "#703700",
            "on-primary-container": "#452000",
            "tertiary-fixed-dim": "#eabda5",
            "secondary-fixed": "#d2e4ff",
            "on-secondary": "#1f3247",
            "secondary": "#b5c8e4",
            "on-tertiary-fixed": "#2d1607",
            "error": "#ffb4ab",
            "inverse-primary": "#934b00",
            "secondary-fixed-dim": "#b5c8e4",
            "tertiary-container": "#b08872",
            "tertiary": "#eabda5",
            "on-surface-variant": "#dbc2b1",
            "primary": "#ffb782",
            "outline": "#a38c7e",
            "inverse-on-surface": "#2e3136",
            "primary-fixed-dim": "#ffb782",
            "on-background": "#e1e2e9",
            "on-tertiary": "#452a19",
            "surface-tint": "#ffb782",
            "on-secondary-fixed-variant": "#35485f",
            "on-secondary-container": "#a3b7d2",
            "surface": "#101418",
            "surface-container-high": "#272a2f",
            "error-container": "#93000a",
            "surface-bright": "#36393f",
            "inverse-surface": "#e1e2e9",
            "tertiary-fixed": "#ffdbc9",
            "secondary-container": "#35485f",
            "surface-dim": "#101418",
            "surface-variant": "#32353a",
            "primary-container": "#d87821",
            "on-primary": "#4f2500",
            "on-error": "#690005",
            "primary-fixed": "#ffdcc5",
            "on-error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#5e402e"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          fontFamily: {
            headline: ["Noto Serif"],
            body: ["Newsreader"],
            label: ["Work Sans"]
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    /* `height: 100dvh` is the dynamic viewport height — it matches the
       VISIBLE area on mobile browsers (i.e. excludes the address bar's
       chrome). With plain `height: 100%`, mobile Safari/Chrome give us
       the larger layout-viewport size, which puts the footer below the
       visible area. The 100% line stays as a fallback for older browsers
       that don't recognise `dvh` units. */
    html, body { margin: 0; padding: 0; height: 100%; height: 100dvh; }

    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .glow-sm { filter: drop-shadow(0 0 5px rgba(255, 183, 130, 0.5)); }

    .parchment-texture { background-color: #ecd9a8; position: relative; }

    /* The .page-text-page element is owned by StPageFlip — it dynamically sets
       inline `display: block` (when visible) or `display: none` (when hidden).
       We must NOT override that with !important or hidden pages stay visible
       and overlap the cover. The flex layout that constrains the body lives in
       a child .page-text-inner wrapper instead (see renderTextPage in
       buildBook.js). */
    /* The parchment surface is intentionally flat — no ::before texture overlay,
       no gradient, no shadow. Just one solid color across the entire page. */

    /* Hide StPageFlip's static shadow nodes so they don't darken the page near
       the spine or edges. maxShadowOpacity:0 in buildBook.js handles the dynamic
       shadows during flip; this catches any static ones the library renders. */
    .stf__outerShadow,
    .stf__innerShadow,
    .stf__hardShadow,
    .stf__hardInnerShadow { display: none !important; }

    .desk-bg { background: radial-gradient(circle at center, #2d1b0e 0%, #101418 100%); }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(45, 27, 14, 0.2); border-radius: 10px; }

    /* Auto-scroll uses instant scrollTop assignments (no scroll-behavior:
       smooth). The reasons:
       1. The BookController's leading-edge scroll fires at most once every
          ~30 lines of text, so chunky jumps are intentional and visible.
       2. With smooth scrolling enabled, scrollTop reads return the
          in-flight animation value, which makes the user-activity detector
          (compare current scrollTop to last assigned) wildly unreliable.
       3. The smooth animation can race the next audio timeupdate and
          produce visual jitter. */

    /* Book frame sizing. The desktop default is a landscape spread book
       (7/5) bounded by main's height. Mobile portrait drops the aspect
       constraint entirely so the brown frame fills main top-to-bottom and
       left-to-right — the StPageFlip wrapper inside is sized dynamically
       (see buildBook.js) to match the actual container aspect, so the
       parchment fills the frame instead of leaving big empty top/bottom
       gaps. Mobile landscape phones (small height + landscape orientation)
       get a 5/7 portrait-shaped frame so the merged single-page layout
       still looks like a book and StPageFlip stays in portrait mode. */
    .book-outer-frame {
      aspect-ratio: 7 / 5;
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
    }
    @media (max-width: 720px) and (orientation: portrait) {
      .book-outer-frame {
        aspect-ratio: auto;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
      }
    }
    @media (max-height: 720px) and (orientation: landscape) {
      .book-outer-frame {
        aspect-ratio: 5 / 7;
        width: auto;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
      }
    }

    /* Ken Burns keyframes — must match the names that KenBurns.js writes as inline animation */
    @keyframes kb-zoom-in-center {
      from { transform: scale(1.0) translate(0, 0); }
      to   { transform: scale(1.10) translate(0, 0); }
    }
    @keyframes kb-zoom-in-left {
      from { transform: scale(1.0) translate(0, 0); }
      to   { transform: scale(1.12) translate(-3%, 0); }
    }
    @keyframes kb-zoom-in-right {
      from { transform: scale(1.0) translate(0, 0); }
      to   { transform: scale(1.12) translate(3%, 0); }
    }
    @keyframes kb-zoom-out {
      from { transform: scale(1.12); }
      to   { transform: scale(1.0); }
    }
    @keyframes kb-pan-left {
      from { transform: scale(1.08) translate(3%, 0); }
      to   { transform: scale(1.08) translate(-3%, 0); }
    }
    @keyframes kb-pan-right {
      from { transform: scale(1.08) translate(-3%, 0); }
      to   { transform: scale(1.08) translate(3%, 0); }
    }
    .kb-active { animation-fill-mode: forwards; }

    /* Word-sync highlighting — unspoken words sit faint, spoken words brighten */
    .page-text-page .word,
    .page-merged .word {
      opacity: 0.35;
      transition: opacity 280ms ease-out;
    }
    .page-text-page .word.spoken,
    .page-merged .word.spoken { opacity: 1; }
    .page-text-page:not(.reveal) .word,
    .page-merged:not(.reveal) .word { opacity: 1; }

    /* Reveal animation when the text page first appears */
    .page-text-page.reveal .page-body,
    .page-merged.reveal .page-body {
      animation: text-fade-in 800ms ease-out;
    }
    @keyframes text-fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Quill cursor — tracks the last-spoken word on desktop. Rendered as a
       solid dark glyph so it stays legible on the parchment background; the
       white fountain-pen emoji washed out and was hard to spot. */
    .page-text-page .quill {
      position: absolute;
      font-size: 22px;
      color: #2d1607;
      pointer-events: none;
      opacity: 0;
      transform: translate(-2px, -18px) rotate(-15deg);
      transition: left 220ms ease-out, top 220ms ease-out, opacity 220ms;
      filter: drop-shadow(0 1px 1px rgba(255, 220, 197, 0.35));
    }
    .page-text-page .quill.active {
      opacity: 1;
      animation: quill-bob 700ms ease-in-out infinite;
    }
    @keyframes quill-bob {
      0%, 100% { transform: translate(-2px, -18px) rotate(-15deg); }
      50%      { transform: translate(-2px, -22px) rotate(-18deg); }
    }

    /* Voice slider — styled to match Stitch's gradient track + glowing thumb */
    input[type="range"]#volume {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, #ffb782 var(--vol, 100%), #32353a var(--vol, 100%));
      border-radius: 9999px;
      outline: none;
      cursor: pointer;
      margin: 0;
    }
    input[type="range"]#volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 9999px;
      background: #ffb782;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(255, 183, 130, 0.8);
      cursor: pointer;
    }
    input[type="range"]#volume::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 9999px;
      background: #ffb782;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(255, 183, 130, 0.8);
      cursor: pointer;
    }

    /* Error screen + toast (carried over from the old stylesheet) */
    .error-screen {
      color: #f0e4c9;
      background: #3a1a10;
      border: 1px solid #7a3a1f;
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      text-align: center;
      margin: auto;
    }
    .error-screen button {
      margin-top: 12px;
      padding: 8px 16px;
      background: #5a2a13;
      color: #f0e4c9;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 14, 7, 0.95);
      color: #f0e4c9;
      padding: 10px 18px;
      border-radius: 6px;
      z-index: 1000;
    }

    /* Mobile adjustments */
    @media (max-width: 720px), (max-height: 720px) {
      .book-outer-frame { --tw-ring-offset-width: 0; }
      /* Make the text body scrollable on small screens so word-sync auto-scroll
         can track the currently-spoken word; override the JS-set font size with
         a readable default. No smooth scroll — see comment above for reasons. */
      .page-text-page .page-body,
      .page-merged .page-body {
        overflow-y: auto !important;
        font-size: 16px !important;
        scrollbar-width: none;
      }
      .page-text-page .page-body::-webkit-scrollbar,
      .page-merged .page-body::-webkit-scrollbar { display: none; }
    }

  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col overflow-hidden desk-bg">

  <!-- Tailwind Play CDN safelist: classes added dynamically via innerHTML in js/buildBook.js
       aren't always caught by the CDN's MutationObserver. Referencing them in a hidden node
       forces the CDN to generate the corresponding rules during its initial scan. -->
  <div class="hidden md:p-16 md:text-4xl text-3xl"></div>

  <!-- Top app bar — compact on mobile (any small dimension), big chrome only
       when BOTH viewport dimensions are >720px (the `big:` custom screen). -->
  <header class="bg-[#101418] flex justify-between items-center w-full px-3 big:px-8 py-1.5 big:py-3 z-50 shadow-2xl shadow-black/60 sticky top-0 shrink-0">
    <h1 id="story-title" class="font-['Noto_Serif'] font-bold tracking-tight text-base big:text-3xl text-[#ffb782] drop-shadow-sm"></h1>
  </header>

  <!-- Main book area — minimal padding so the book frame can fill the gap between header and footer -->
  <main class="flex-grow flex items-center justify-center p-1.5 big:p-4 lg:p-6 relative min-h-0">
    <!-- Floating dust/motes decoration -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden opacity-30">
      <div class="absolute top-1/4 left-1/4 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
      <div class="absolute top-3/4 left-1/3 w-1.5 h-1.5 bg-secondary rounded-full blur-[2px]"></div>
      <div class="absolute top-1/2 right-1/4 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
    </div>
    <!-- Dark wood book frame (decorative; StPageFlip mounts inside). Aspect
         ratio is set in the <style> block via the matching custom media query
         so it stays in lock-step with the BookController's matchMedia. -->
    <div class="book-outer-frame relative max-w-6xl bg-[#2d1b0e] rounded-xl shadow-[0_50px_100px_-20px_rgba(0,0,0,0.7)] p-1.5 big:p-4 ring-2 big:ring-8 ring-[#1a0f08] overflow-hidden">
      <div id="book" class="w-full h-full"></div>
    </div>
  </main>

  <!-- Footer control bar — compact on small viewports, full size on `big:`
       (both dimensions >720px). -->
  <footer class="w-full z-50 flex justify-around items-center px-2 big:px-12 pb-2 big:pb-6 pt-1.5 big:pt-3 bg-gradient-to-t from-black/80 to-transparent shrink-0">
    <div class="flex flex-wrap justify-center items-center gap-2 big:gap-12 bg-[#1b1f23]/90 backdrop-blur-xl px-3 big:px-12 py-1 big:py-3 rounded-2xl big:rounded-full shadow-2xl border border-white/5">
      <!-- Navigation -->
      <div class="flex gap-1 big:gap-4 items-center">
        <button id="btn-prev" class="flex flex-col items-center justify-center text-[#b5c8e4]/60 big:text-[#b5c8e4]/40 p-1 big:p-4 hover:text-[#ffb782] hover:scale-110 transition-transform active:brightness-125">
          <span class="material-symbols-outlined text-base big:text-2xl big:mb-1">arrow_back_ios</span>
          <span class="font-['Work_Sans'] text-[8px] big:text-[10px] uppercase tracking-widest">Previous</span>
        </button>
        <button id="btn-play" class="flex flex-col items-center justify-center bg-[#d87821]/20 text-[#ffb782] rounded-full px-3 big:px-6 py-1 big:py-4 ring-1 ring-[#ffb782]/30 hover:glow-sm transition-all active:brightness-125">
          <span id="btn-play-icon" class="material-symbols-outlined text-xl big:text-3xl big:mb-1" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
          <span class="font-['Work_Sans'] text-[8px] big:text-[10px] uppercase tracking-widest">Play</span>
        </button>
        <button id="btn-next" class="flex flex-col items-center justify-center text-[#b5c8e4]/60 big:text-[#b5c8e4]/40 p-1 big:p-4 hover:text-[#ffb782] hover:scale-110 transition-transform active:brightness-125">
          <span class="material-symbols-outlined text-base big:text-2xl big:mb-1">arrow_forward_ios</span>
          <span class="font-['Work_Sans'] text-[8px] big:text-[10px] uppercase tracking-widest">Next</span>
        </button>
      </div>

      <!-- Voice slider + speed dropdown -->
      <div class="flex items-center gap-2 big:gap-6 big:border-l big:border-white/10 big:pl-12">
        <div class="flex flex-col gap-0.5 big:gap-2 w-24 big:w-48">
          <div class="hidden big:flex justify-between items-center mb-1">
            <label for="volume" class="font-label text-[10px] uppercase tracking-widest text-[#b5c8e4]/60">Voice Resonance</label>
            <span id="volume-label" class="text-primary text-[10px] font-bold">100%</span>
          </div>
          <input id="volume" type="range" min="0" max="100" value="100"/>
        </div>
        <div class="relative">
          <select id="speed" class="bg-surface-container-high hover:bg-surface-bright px-2 big:px-4 py-1 big:py-2 rounded-lg big:rounded-xl border border-white/5 font-label text-[9px] big:text-xs uppercase tracking-widest text-on-surface appearance-none cursor-pointer">
            <option value="0.8">Slow</option>
            <option value="1" selected>Normal</option>
            <option value="1.2">Swift</option>
          </select>
        </div>
      </div>
    </div>
  </footer>

  <audio id="narration" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
